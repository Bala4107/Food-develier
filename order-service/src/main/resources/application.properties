server.port=${PORT:8081}

# Database Configuration (In-Memory H2 in MySQL Compatibility Mode)
spring.datasource.url=jdbc:h2:mem:food_order_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ActiveMQ JMS Broker Configuration (Embedded VM Broker)
spring.activemq.broker-url=vm://localhost?broker.persistent=false
spring.activemq.user=admin
spring.activemq.password=admin
# Custom ActiveMQ queue configuration
app.queue.order-created=order.created

# Camunda Configuration
camunda.bpm.enabled=true
camunda.bpm.database.schema-update=true
camunda.bpm.history-level=full
camunda.bpm.generic-properties.properties.enforce-history-time-to-live=false

# Camunda Admin User Configuration
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
camunda.bpm.admin-user.firstName=Admin
camunda.bpm.admin-user.lastName=System
camunda.bpm.admin-user.email=admin@localhost

# Enable Camunda auto-deployment of processes
camunda.bpm.auto-deployment-enabled=true

# CORS - set CORS_ALLOWED_ORIGINS env var on Render to your Vercel URL
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# JWT Secret - set JWT_SECRET env var on Render (min 32 chars)
app.jwt.secret=${JWT_SECRET:9a4f2c8d3e7b1a6c5d8e7f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c}

# Logging Level
logging.level.org.camunda.bpm.engine=WARN
logging.level.com.food.order=INFO
